<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケストポスカ確認用</title>
    <style>
        :root {
            --orange: #d45228;
            --blue:   #3a7ab5;
            --bg:     #181f26;
            --panel:  #1e2830;
            --surface:#252f38;
            --border: #2e3d4a;
            --text:   #e8edf2;
            --muted:  #607080;
            --pokestop-blue: #30bef0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: .7rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .logo-dot {
            width: 8px; height: 8px;
            background: var(--orange);
            border-radius: 50%;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .grid-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            padding: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        .grid-btn.active {
            color: var(--orange);
            border-color: var(--orange);
            background: rgba(212, 82, 40, 0.1);
        }

        .mode-switch {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .mode-btn {
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 12px;
            cursor: pointer;
            transition: background .15s, color .15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mode-btn:last-child { border-right: none; }
        .mode-btn.active { background: var(--orange); color: #fff; }
        
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 1rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stage {
            background: var(--pokestop-blue);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            user-select: none;
            touch-action: pan-y;
            transition: background 0.3s;
        }
        .stage.drag-over { outline: 2px dashed var(--orange); outline-offset: -4px; }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 28px;
            line-height: 1;
            border-radius: 50%;
            z-index: 10;
            transition: background 0.2s;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(0, 0, 0, 0.4); }
        .nav-btn:disabled { opacity: 0; cursor: default; }
        .nav-btn.prev { left: 10px; }
        .nav-btn.next { right: 10px; }

        .frame-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: opacity .3s;
        }
        .ring-1 { width: 282px; height: 282px; border: 2.5px solid #fff; }
        .ring-2 { width: 302px; height: 302px; border: 1px solid rgba(255,255,255,.3); }

        .mode-gift .ring { opacity: 0; }
        .mode-disk .ring { opacity: 1; }

        .holder {
            width: 260px; height: 260px;
            overflow: hidden;
            position: relative;
            background: #000;
            flex-shrink: 0;
            transition: border-radius .3s;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .mode-disk .holder { border-radius: 50%; }
        .mode-gift .holder { border-radius: 0; }

        .holder img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: none;
        }
        
        .grid-3x3 { display: block; }
        .grid-3x3 .line { position: absolute; background: rgba(255, 255, 255, 0.4); }
        .grid-3x3 .v1 { left: 33.33%; top: 0; bottom: 0; width: 1px; }
        .grid-3x3 .v2 { left: 66.66%; top: 0; bottom: 0; width: 1px; }
        .grid-3x3 .h1 { top: 33.33%; left: 0; right: 0; height: 1px; }
        .grid-3x3 .h2 { top: 66.66%; left: 0; right: 0; height: 1px; }

        .grid-center { display: block; }
        .grid-center .center-cross {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
        }
        .grid-center .center-cross::before,
        .grid-center .center-cross::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.6);
        }
        .grid-center .center-cross::before { top: 50%; left: 0; width: 100%; height: 1px; }
        .grid-center .center-cross::after { left: 50%; top: 0; height: 100%; width: 1px; }
        
        .grid-center .edge-mark { position: absolute; background: rgba(255, 255, 255, 0.5); }
        .grid-center .mark-t { top: 0; left: 50%; width: 1px; height: 8px; transform: translateX(-50%); }
        .grid-center .mark-b { bottom: 0; left: 50%; width: 1px; height: 8px; transform: translateX(-50%); }
        .grid-center .mark-l { left: 0; top: 50%; height: 1px; width: 8px; transform: translateY(-50%); }
        .grid-center .mark-r { right: 0; top: 50%; height: 1px; width: 8px; transform: translateY(-50%); }

        .empty {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px; color: #fff; font-size: 12px; text-align: center;
        }

        .counter {
            margin-top: 1rem;
            font-size: 12px;
            color: #fff;
            letter-spacing: 1px;
            min-height: 16px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .dots {
            display: flex; gap: 6px; margin-top: .5rem;
            min-height: 10px;
        }
        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: background .15s;
        }
        .dot.active { background: #fff; }

        .controls {
            border-top: 1px solid var(--border);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .thumbs {
            display: flex; flex-wrap: wrap; gap: 6px;
            min-height: 0;
            max-height: 150px;
            overflow-y: auto;
            padding: 2px;
        }
        .thumb {
            width: 48px; height: 48px;
            object-fit: cover;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: .5;
            transition: all .15s;
            border-radius: 4px;
        }
        .thumb.active { border-color: var(--orange); opacity: 1; transform: scale(1.05); }
        .thumb:hover { opacity: .85; }

        .dropzone {
            border: 2px dashed var(--border);
            padding: 1.25rem;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: rgba(255,255,255,0.02);
        }
        .dropzone:hover, .dropzone.drag-over { 
            border-color: var(--orange); 
            background: rgba(212, 82, 40, 0.05);
        }
        .drop-label {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; color: var(--text); font-size: 14px; cursor: pointer;
        }
        input[type="file"] { display: none; }

        .footer {
            padding: 0 0.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
        }

        /* PC等、横長画面用の調整 */
        @media (min-width: 768px) {
            main {
                padding: 2rem;
                align-items: flex-start;
            }
            .card {
                max-width: 600px; /* PCでは少し大きめに表示 */
            }
            .holder {
                width: 300px; height: 300px; /* プレビューを少し拡大 */
            }
            .ring-1 { width: 322px; height: 322px; }
            .ring-2 { width: 342px; height: 342px; }
            .thumb { width: 56px; height: 56px; }
        }
 /* カメラ撮影モード */
.camera-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  z-index: 0;
  background: #000;
}

.holder > img {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.holder.camera-on .camera-video {
  display: block;
}

.holder.camera-on > img,
.holder.camera-on #emptyState {
  display: none !important;
}

.grid-overlay {
  z-index: 2;
}

.empty {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.camera-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
}

.camera-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: .8rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.camera-btn:disabled {
  opacity: .45;
  cursor: default;
}  
    </style>
</head>
<body class="mode-disk">

<header>
    <div class="logo">
        <span class="logo-dot"></span>
        ポケストポスカ確認用
    </div>
    <div class="header-controls">
        <button class="grid-btn" id="btn-grid-toggle" title="グリッド切替">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="3" x2="8" y2="21" />
                <line x1="16" y1="3" x2="16" y2="21" />
                <line x1="3" y1="8" x2="21" y2="8" />
                <line x1="3" y1="16" x2="21" y2="16" />
            </svg>
        </button>
        <div class="mode-switch">
            <button class="mode-btn active" id="btn-disk" title="ディスクモード">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
            </button>
            <button class="mode-btn" id="btn-gift" title="ギフトモード">
                <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1.5"/></svg>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="card">
        <div class="stage" id="stage">
            <button class="nav-btn prev" id="btn-prev" disabled aria-label="前の画像">&#8249;</button>
            <button class="nav-btn next" id="btn-next" disabled aria-label="次の画像">&#8250;</button>

            <div class="frame-wrap">
                <div class="ring ring-2"></div>
                <div class="ring ring-1"></div>
                <div class="holder" id="holder">
                  <video id="cameraVideo" class="camera-video" autoplay playsinline muted></video> 
                  <div id="grid-3x3" class="grid-overlay">
                        <div class="line v1"></div><div class="line v2"></div>
                        <div class="line h1"></div><div class="line h2"></div>
                    </div>
                    <div id="grid-center" class="grid-overlay">
                        <div class="center-cross"></div>
                        <div class="edge-mark mark-t"></div><div class="edge-mark mark-b"></div>
                        <div class="edge-mark mark-l"></div><div class="edge-mark mark-r"></div>
                    </div>

                    <div class="empty" id="emptyState">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        <span>画像をドロップ<br>または下から選択</span>
                    </div>
                </div>
            </div>

            <div class="counter" id="counter"></div>
            <div class="dots"   id="dots"></div>
        </div>

        <div class="controls">
            <div class="thumbs" id="thumbs"></div>

            <div class="dropzone" id="dropzone">
                <label class="drop-label" for="fileInput">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    画像を追加（複数可）
                </label>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>
<div class="camera-actions">
  <button class="camera-btn" id="btn-camera">📷 カメラ起動</button>
  <button class="camera-btn" id="btn-shot" disabled>この枠で撮影</button>
</div>

<canvas id="captureCanvas" hidden></canvas>

            <div class="footer">
                <span>PC: 矢印キーで切替 / スマホ: スワイプ</span>
                <span>v1.01</span>
            </div>
        </div>
    </div>
</main>

<script>
let imgs    = [];
let current = 0;
let gridState = 0; 

const body      = document.body;
const holder    = document.getElementById('holder');
const empty     = document.getElementById('emptyState');
const counterEl = document.getElementById('counter');
const dotsEl    = document.getElementById('dots');
const thumbsEl  = document.getElementById('thumbs');
const stage     = document.getElementById('stage');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const btnDisk   = document.getElementById('btn-disk');
const btnGift   = document.getElementById('btn-gift');
const btnGrid   = document.getElementById('btn-grid-toggle');

const grid3x3    = document.getElementById('grid-3x3');
const gridCenter = document.getElementById('grid-center');
const cameraVideo = document.getElementById('cameraVideo');
const btnCamera = document.getElementById('btn-camera');
const btnShot = document.getElementById('btn-shot');
const captureCanvas = document.getElementById('captureCanvas');

let cameraStream = null;
btnDisk.onclick = () => setMode('disk');
btnGift.onclick = () => setMode('gift');

function setMode(m) {
    body.className = 'mode-' + m;
    btnDisk.classList.toggle('active', m === 'disk');
    btnGift.classList.toggle('active', m === 'gift');
}

btnGrid.onclick = () => {
    gridState = (gridState + 1) % 3;
    grid3x3.className = 'grid-overlay' + (gridState === 1 ? ' grid-3x3' : '');
    gridCenter.className = 'grid-overlay' + (gridState === 2 ? ' grid-center' : '');
    btnGrid.classList.toggle('active', gridState !== 0);
};

fileInput.onchange = e => load(e.target.files);

const stop = e => e.preventDefault();
['dragover', 'drop'].forEach(evt => {
    stage.addEventListener(evt, stop);
    dropzone.addEventListener(evt, stop);
});

stage.ondragenter = () => stage.classList.add('drag-over');
stage.ondragleave = () => stage.classList.remove('drag-over');
stage.ondrop = e => { stage.classList.remove('drag-over'); load(e.dataTransfer.files); };

function load(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;
    let n = 0;
    const start = imgs.length;
    files.forEach(f => {
        const r = new FileReader();
        r.onload = e => {
            imgs.push({ src: e.target.result });
            if (++n === files.length) { 
                current = start; 
                render(); 
            }
        };
        r.readAsDataURL(f);
    });
}

function render() {
    const old = holder.querySelector('img');
    if (old) old.remove();

    empty.style.display = imgs.length ? 'none' : 'flex';
    if (!imgs.length) {
        counterEl.textContent = '';
        dotsEl.innerHTML = '';
        thumbsEl.innerHTML = '';
        btnPrev.disabled = true;
        btnNext.disabled = true;
        return;
    }

    current = Math.max(0, Math.min(current, imgs.length - 1));

    const el = document.createElement('img');
    el.src = imgs[current].src;
    holder.appendChild(el);

    counterEl.textContent = `${current + 1} / ${imgs.length}`;

    dotsEl.innerHTML = '';
    imgs.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === current ? ' active' : '');
        d.onclick = () => { current = i; render(); };
        dotsEl.appendChild(d);
    });

    thumbsEl.innerHTML = '';
    imgs.forEach((im, i) => {
        const t = document.createElement('img');
        t.src = im.src;
        t.className = 'thumb' + (i === current ? ' active' : '');
        t.onclick = () => { current = i; render(); };
        thumbsEl.appendChild(t);
    });

    btnPrev.disabled = current === 0;
    btnNext.disabled = current === imgs.length - 1;
}

const go = dir => {
    const next = current + dir;
    if (next >= 0 && next < imgs.length) {
        current = next;
        render();
    }
};

btnPrev.onclick = () => go(-1);
btnNext.onclick = () => go(1);

document.onkeydown = e => {
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === 'ArrowRight') go(1);
};

let startX = 0;
stage.ontouchstart = e => startX = e.touches[0].clientX;
stage.ontouchend = e => {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) go(diff > 0 ? -1 : 1);
};

async function startCamera() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('このブラウザではカメラ機能が使えません。');
      return;
    }

    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' }
      },
      audio: false
    });

    cameraVideo.srcObject = cameraStream;
    holder.classList.add('camera-on');

    btnCamera.textContent = '■ カメラ停止';
    btnShot.disabled = false;
  } catch (err) {
    console.error(err);
    alert('カメラを起動できませんでした。ブラウザのカメラ許可を確認してください。');
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }

  cameraVideo.srcObject = null;
  holder.classList.remove('camera-on');

  btnCamera.textContent = '📷 カメラ起動';
  btnShot.disabled = true;
}

function drawVideoCover(ctx, video, w, h) {
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const videoRatio = vw / vh;
  const canvasRatio = w / h;

  let sx = 0;
  let sy = 0;
  let sw = vw;
  let sh = vh;

  if (videoRatio > canvasRatio) {
    sw = vh * canvasRatio;
    sx = (vw - sw) / 2;
  } else {
    sh = vw / canvasRatio;
    sy = (vh - sh) / 2;
  }

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
}

function captureFromCamera() {
  if (!cameraStream || !cameraVideo.videoWidth) return;

  const w = holder.clientWidth;
  const h = holder.clientHeight;

  captureCanvas.width = w;
  captureCanvas.height = h;

  const ctx = captureCanvas.getContext('2d');
  drawVideoCover(ctx, cameraVideo, w, h);

  const src = captureCanvas.toDataURL('image/jpeg', 0.95);

  imgs.push({ src });
  current = imgs.length - 1;

  stopCamera();
  render();
}

btnCamera.onclick = () => {
  if (cameraStream) {
    stopCamera();
  } else {
    startCamera();
  }
};

btnShot.onclick = captureFromCamera;
  
  render();
</script>

</body>
</html>
