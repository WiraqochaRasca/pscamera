<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケストポスカ確認用</title>
  <style>
    :root {
      --orange: #d45228;
      --blue: #3a7ab5;
      --bg: #181f26;
      --panel: #1e2830;
      --surface: #252f38;
      --border: #2e3d4a;
      --text: #e8edf2;
      --muted: #607080;
      --pokestop-blue: #30bef0;
      --camera-aspect: 1 / 1;
      --preview-brightness: 100%;
      --preview-contrast: 100%;
      --digital-zoom: 1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: .7rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--orange);
      border-radius: 50%;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .grid-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      padding: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }

    .grid-btn.active {
      color: var(--orange);
      border-color: var(--orange);
      background: rgba(212, 82, 40, 0.1);
    }

    .mode-switch {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .mode-btn {
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 12px;
      cursor: pointer;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mode-btn:last-child { border-right: none; }
    .mode-btn.active { background: var(--orange); color: #fff; }

    .icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 1rem;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--panel);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .stage {
      background: var(--pokestop-blue);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      user-select: none;
      touch-action: pan-y;
      transition: background 0.3s;
    }

    .stage.drag-over {
      outline: 2px dashed var(--orange);
      outline-offset: -4px;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      border-radius: 50%;
      z-index: 10;
      transition: background 0.2s;
    }

    .nav-btn:hover:not(:disabled) { background: rgba(0, 0, 0, 0.4); }
    .nav-btn:disabled { opacity: 0; cursor: default; }
    .nav-btn.prev { left: 10px; }
    .nav-btn.next { right: 10px; }

    .frame-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      transition: opacity .3s;
    }

    .ring-1 { width: 282px; height: 282px; border: 2.5px solid #fff; }
    .ring-2 { width: 302px; height: 302px; border: 1px solid rgba(255,255,255,.3); }

    .mode-gift .ring { opacity: 0; }
    .mode-disk .ring { opacity: 1; }

    .holder {
      width: 260px;
      height: auto;
      aspect-ratio: var(--camera-aspect);
      overflow: hidden;
      position: relative;
      background: #000;
      flex-shrink: 0;
      transition: border-radius .3s, aspect-ratio .2s;
      border: 3px solid #fff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .mode-disk .holder { border-radius: 50%; }
    .mode-gift .holder { border-radius: 0; }

    .holder img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      user-select: none;
      z-index: 1;
    }

    .camera-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 0;
      background: #000;
      filter: brightness(var(--preview-brightness)) contrast(var(--preview-contrast));
      transform: scale(var(--digital-zoom));
      transform-origin: center center;
    }

    .holder.camera-on .camera-video { display: block; }
    .holder.camera-on > img,
    .holder.camera-on #emptyState { display: none !important; }

    .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
      z-index: 2;
    }

    .grid-3x3 { display: block; }
    .grid-3x3 .line { position: absolute; background: rgba(255, 255, 255, 0.4); }
    .grid-3x3 .v1 { left: 33.33%; top: 0; bottom: 0; width: 1px; }
    .grid-3x3 .v2 { left: 66.66%; top: 0; bottom: 0; width: 1px; }
    .grid-3x3 .h1 { top: 33.33%; left: 0; right: 0; height: 1px; }
    .grid-3x3 .h2 { top: 66.66%; left: 0; right: 0; height: 1px; }

    .grid-center { display: block; }
    .grid-center .center-cross {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
    }

    .grid-center .center-cross::before,
    .grid-center .center-cross::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.6);
    }

    .grid-center .center-cross::before { top: 50%; left: 0; width: 100%; height: 1px; }
    .grid-center .center-cross::after { left: 50%; top: 0; height: 100%; width: 1px; }

    .grid-center .edge-mark { position: absolute; background: rgba(255, 255, 255, 0.5); }
    .grid-center .mark-t { top: 0; left: 50%; width: 1px; height: 8px; transform: translateX(-50%); }
    .grid-center .mark-b { bottom: 0; left: 50%; width: 1px; height: 8px; transform: translateX(-50%); }
    .grid-center .mark-l { left: 0; top: 50%; height: 1px; width: 8px; transform: translateY(-50%); }
    .grid-center .mark-r { right: 0; top: 50%; height: 1px; width: 8px; transform: translateY(-50%); }

    .empty {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #fff;
      font-size: 12px;
      text-align: center;
    }

    .camera-guide {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      display: none;
    }

    .holder.camera-on .camera-guide { display: block; }

    .guide-line {
      position: absolute;
      background: rgba(255, 255, 255, .75);
      box-shadow: 0 0 2px rgba(0, 0, 0, .7);
    }

    .guide-line-v { top: 0; bottom: 0; left: 50%; width: 1px; }
    .guide-line-h { left: 0; right: 0; top: 50%; height: 1px; }

    .guide-circle {
      position: absolute;
      left: 50%;
      top: 50%;
      border: 1px solid rgba(255, 255, 255, .75);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 2px rgba(0, 0, 0, .7);
    }

    .guide-circle-outer { width: 78%; aspect-ratio: 1 / 1; }
    .guide-circle-inner { width: 42%; aspect-ratio: 1 / 1; border-style: dashed; }

    .guide-level {
      position: absolute;
      left: 50%;
      top: 12%;
      width: 70%;
      height: 3px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 0 2px rgba(0, 0, 0, .7);
      transform: translateX(-50%) rotate(var(--level-angle, 0deg));
      transform-origin: center center;
      transition: transform .08s linear, background .12s;
    }

    .guide-level.level-ok {
      background: rgba(120, 255, 150, .95);
    }

    .guide-level::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      color: rgba(255, 255, 255, .95);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 2px rgba(0, 0, 0, .7);
    }

    .focus-marker {
      position: absolute;
      width: 64px;
      height: 64px;
      border: 2px solid rgba(255, 255, 255, .95);
      border-radius: 50%;
      z-index: 6;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.8);
      opacity: 0;
      box-shadow: 0 0 4px rgba(0, 0, 0, .75);
    }

    .focus-marker.show { animation: focus-pop .75s ease-out; }

    @keyframes focus-pop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(1.35); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(.85); }
    }

    .counter {
      margin-top: 1rem;
      font-size: 12px;
      color: #fff;
      letter-spacing: 1px;
      min-height: 16px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .dots {
      display: flex;
      gap: 6px;
      margin-top: .5rem;
      min-height: 10px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: background .15s;
    }

    .dot.active { background: #fff; }

    .controls {
      border-top: 1px solid var(--border);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
      max-height: 150px;
      overflow-y: auto;
      padding: 2px;
    }

    .thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: .5;
      transition: all .15s;
      border-radius: 4px;
    }

    .thumb.active { border-color: var(--orange); opacity: 1; transform: scale(1.05); }
    .thumb:hover { opacity: .85; }

    .dropzone {
      border: 2px dashed var(--border);
      padding: 1.25rem;
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: rgba(255,255,255,0.02);
    }

    .dropzone:hover,
    .dropzone.drag-over {
      border-color: var(--orange);
      background: rgba(212, 82, 40, 0.05);
    }

    .drop-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    input[type="file"] { display: none; }

    .camera-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .camera-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: .8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .camera-btn:disabled {
      opacity: .45;
      cursor: default;
    }

    .camera-controls {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 14px;
    }

    .camera-controls label { display: grid; gap: 4px; }
    .camera-controls input,
    .camera-controls select { width: 100%; }

    .adjustment-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .adjustment-mode {
      min-height: 34px;
    }



    .camera-zoom-panel {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 14px;
    }

    .zoom-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .zoom-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .zoom-row input[type="range"] {
      width: 100%;
      min-width: 0;
    }

    .zoom-btn {
      min-width: 44px;
      padding: .65rem .75rem;
      line-height: 1;
    }

    .camera-note {
      margin: 0;
      opacity: .75;
      font-size: 12px;
      line-height: 1.5;
    }

    .footer {
      padding: 0 0.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
    }

    @media (min-width: 520px) {
      .camera-actions { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 768px) {
      main {
        padding: 2rem;
        align-items: flex-start;
      }

      .card { max-width: 600px; }
      .holder { width: 300px; }
      .ring-1 { width: 322px; height: 322px; }
      .ring-2 { width: 342px; height: 342px; }
      .thumb { width: 56px; height: 56px; }
      .camera-actions { grid-template-columns: 1fr 1fr 1fr 1fr; }
    }
  </style>
</head>
<body class="mode-disk">

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    ポケストポスカ確認用
  </div>
  <div class="header-controls">
    <button class="grid-btn" id="btn-grid-toggle" title="グリッド切替">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="3" x2="8" y2="21" />
        <line x1="16" y1="3" x2="16" y2="21" />
        <line x1="3" y1="8" x2="21" y2="8" />
        <line x1="3" y1="16" x2="21" y2="16" />
      </svg>
    </button>
    <div class="mode-switch">
      <button class="mode-btn active" id="btn-disk" title="ディスクモード">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
      </button>
      <button class="mode-btn" id="btn-gift" title="ギフトモード">
        <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1.5"/></svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <div class="stage" id="stage">
      <button class="nav-btn prev" id="btn-prev" disabled aria-label="前の画像">&#8249;</button>
      <button class="nav-btn next" id="btn-next" disabled aria-label="次の画像">&#8250;</button>

      <div class="frame-wrap">
        <div class="ring ring-2"></div>
        <div class="ring ring-1"></div>

        <div class="holder" id="holder">
          <video id="cameraVideo" class="camera-video" autoplay playsinline muted></video>

          <div class="camera-guide" id="cameraGuide">
            <div class="guide-line guide-line-v"></div>
            <div class="guide-line guide-line-h"></div>
            <div class="guide-circle guide-circle-outer"></div>
            <div class="guide-circle guide-circle-inner"></div>
            <div class="guide-level"></div>
          </div>

          <div class="focus-marker" id="focusMarker"></div>

          <div id="grid-3x3" class="grid-overlay">
            <div class="line v1"></div><div class="line v2"></div>
            <div class="line h1"></div><div class="line h2"></div>
          </div>

          <div id="grid-center" class="grid-overlay">
            <div class="center-cross"></div>
            <div class="edge-mark mark-t"></div><div class="edge-mark mark-b"></div>
            <div class="edge-mark mark-l"></div><div class="edge-mark mark-r"></div>
          </div>

          <div class="empty" id="emptyState">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>画像をドロップ<br>または下から選択</span>
          </div>
        </div>
      </div>

      <div class="counter" id="counter"></div>
      <div class="dots" id="dots"></div>
    </div>

    <div class="controls">
      <div class="thumbs" id="thumbs"></div>


      <div class="camera-zoom-panel">
        <label class="zoom-label">
          <span>ズーム</span>
          <span id="zoomValue">1.0x</span>
        </label>

        <div class="zoom-row">
          <button class="camera-btn zoom-btn" id="btn-zoom-out" type="button" disabled>－</button>
          <input type="range" id="zoomRange" min="1" max="4" step="0.1" value="1" disabled>
          <button class="camera-btn zoom-btn" id="btn-zoom-in" type="button" disabled>＋</button>
          <button class="camera-btn zoom-btn" id="btn-zoom-reset" type="button" disabled>1x</button>
        </div>
      </div>

      <div class="camera-actions">
        <button class="camera-btn" id="btn-shot" disabled>この枠で撮影</button>
        <button class="camera-btn" id="btn-camera">📷 カメラ起動</button>
        <button class="camera-btn" id="btn-retake" disabled>撮り直し</button>
        <button class="camera-btn" id="btn-save" disabled>保存/共有</button>
      </div>

      <div class="dropzone" id="dropzone">
        <label class="drop-label" for="fileInput">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          画像を追加（複数可）
        </label>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>

      <div class="camera-controls" id="cameraControls">
        <label>
          明るさ
          <div class="adjustment-row">
            <select id="brightnessMode" class="adjustment-mode">
              <option value="auto" selected>自動</option>
              <option value="manual">手動</option>
            </select>
            <span id="brightnessValue">100%</span>
          </div>
          <input type="range" id="brightnessRange" min="50" max="150" step="1" value="100" disabled>
        </label>

        <label>
          コントラスト
          <div class="adjustment-row">
            <select id="contrastMode" class="adjustment-mode">
              <option value="auto" selected>自動</option>
              <option value="manual">手動</option>
            </select>
            <span id="contrastValue">100%</span>
          </div>
          <input type="range" id="contrastRange" min="50" max="150" step="1" value="100" disabled>
        </label>


        <label>
          アスペクト比
          <select id="aspectSelect">
            <option value="1:1">1:1 正方形</option>
            <option value="4:3">4:3 横</option>
            <option value="3:4">3:4 縦</option>
            <option value="16:9">16:9 横長</option>
            <option value="9:16">9:16 縦長</option>
          </select>
        </label>

        <label>
          フォーカス
          <select id="focusModeSelect" disabled>
            <option value="continuous">自動</option>
            <option value="manual">手動</option>
          </select>
        </label>

        <label>
          手動フォーカス距離
          <input type="range" id="focusRange" min="0" max="1" step="0.01" value="0" disabled>
        </label>

        <label>
          露出補正
          <input type="range" id="exposureRange" min="0" max="0" step="1" value="0" disabled>
          <span id="exposureValue">非対応</span>
        </label>

        <button class="camera-btn" id="btn-refocus" disabled>フォーカス再調整</button>

        <p class="camera-note" id="cameraSupportNote">カメラ起動後に対応機能を確認します。</p>
      </div>

      <canvas id="captureCanvas" hidden></canvas>

      <div class="footer">
        <span>PC: 矢印キーで切替 / スマホ: スワイプ</span>
        <span>v1.04-auto-brightness-contrast</span>
      </div>
    </div>
  </div>
</main>

<script>
let imgs = [];
let current = 0;
let gridState = 0;

let cameraStream = null;
let cameraTrack = null;
let cameraCapabilities = {};
let lastCameraShotIndex = -1;

let previewBrightness = 100;
let previewContrast = 100;
let currentZoom = 1;
let hardwareZoomSupported = false;
let minZoom = 1;
let maxZoom = 4;
let zoomStep = 0.1;
let levelGuideStatus = '水平線: 固定表示';
let levelGuideActive = false;
let autoAdjustTimer = null;
const autoAdjustCanvas = document.createElement('canvas');
const autoAdjustCtx = autoAdjustCanvas.getContext('2d', { willReadFrequently: true });

const OUTPUT_SIZE = 3072;

const body = document.body;
const holder = document.getElementById('holder');
const empty = document.getElementById('emptyState');
const counterEl = document.getElementById('counter');
const dotsEl = document.getElementById('dots');
const thumbsEl = document.getElementById('thumbs');
const stage = document.getElementById('stage');

function setMode(mode) {
  body.className = 'mode-' + mode;
  btnDisk.classList.toggle('active', mode === 'disk');
  btnGift.classList.toggle('active', mode === 'gift');
}

function render() {
  const old = holder.querySelector('img');
  if (old) old.remove();

  empty.style.display = imgs.length ? 'none' : 'flex';

  if (!imgs.length) {
    current = 0;
    counterEl.textContent = '';
    dotsEl.innerHTML = '';
    thumbsEl.innerHTML = '';
    btnPrev.disabled = true;
    btnNext.disabled = true;
    btnSave.disabled = true;
    return;
  }

  current = Math.max(0, Math.min(current, imgs.length - 1));

  const img = document.createElement('img');
  img.src = imgs[current].src;
  holder.appendChild(img);

  counterEl.textContent = `${current + 1} / ${imgs.length}`;

  dotsEl.innerHTML = '';
  imgs.forEach((_, index) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (index === current ? ' active' : '');
    dot.onclick = () => {
      current = index;
      render();
    };
    dotsEl.appendChild(dot);
  });

  thumbsEl.innerHTML = '';
  imgs.forEach((item, index) => {
    const thumb = document.createElement('img');
    thumb.src = item.src;
    thumb.className = 'thumb' + (index === current ? ' active' : '');
    thumb.onclick = () => {
      current = index;
      render();
    };
    thumbsEl.appendChild(thumb);
  });

  btnPrev.disabled = current === 0;
  btnNext.disabled = current === imgs.length - 1;
  btnSave.disabled = false;
}

function go(direction) {
  const next = current + direction;
  if (next >= 0 && next < imgs.length) {
    current = next;
    render();
  }
}

function load(fileList) {
  const files = Array.from(fileList).filter(file => file.type.startsWith('image/'));
  if (!files.length) return;

  let loaded = 0;
  const start = imgs.length;

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = event => {
      imgs.push({ src: event.target.result });
      loaded += 1;

      if (loaded === files.length) {
        current = start;
        render();
      }
    };
    reader.readAsDataURL(file);
  });
}

function getAspectRatioParts() {
  const [w, h] = aspectSelect.value.split(':').map(Number);
  return { w, h, ratio: w / h };
}

function getOutputSizeByAspect() {
  const { w, h } = getAspectRatioParts();

  if (w === h) {
    return { width: OUTPUT_SIZE, height: OUTPUT_SIZE };
  }

  if (w > h) {
    return {
      width: OUTPUT_SIZE,
      height: Math.round(OUTPUT_SIZE * h / w)
    };
  }

  return {
    width: Math.round(OUTPUT_SIZE * w / h),
    height: OUTPUT_SIZE
  };
}

function applyPreviewAspect() {
  const { w, h } = getAspectRatioParts();
  holder.style.setProperty('--camera-aspect', `${w} / ${h}`);
}

function clampValue(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function setPreviewFilter(brightness, contrast) {
  previewBrightness = Math.round(clampValue(Number(brightness), 50, 150));
  previewContrast = Math.round(clampValue(Number(contrast), 50, 150));

  brightnessRange.value = previewBrightness;
  contrastRange.value = previewContrast;
  brightnessValue.textContent = `${previewBrightness}%`;
  contrastValue.textContent = `${previewContrast}%`;

  holder.style.setProperty('--preview-brightness', `${previewBrightness}%`);
  holder.style.setProperty('--preview-contrast', `${previewContrast}%`);
}

function isBrightnessAuto() {
  return brightnessMode.value === 'auto';
}

function isContrastAuto() {
  return contrastMode.value === 'auto';
}

function updateAdjustmentControlState() {
  brightnessRange.disabled = isBrightnessAuto();
  contrastRange.disabled = isContrastAuto();

  if (!isBrightnessAuto()) {
    previewBrightness = Number(brightnessRange.value);
  }

  if (!isContrastAuto()) {
    previewContrast = Number(contrastRange.value);
  }

  setPreviewFilter(previewBrightness, previewContrast);

  if (cameraStream && (isBrightnessAuto() || isContrastAuto())) {
    startAutoAdjustment();
  } else if (!isBrightnessAuto() && !isContrastAuto()) {
    stopAutoAdjustment();
  }
}

function updatePreviewFilter() {
  if (!isBrightnessAuto()) {
    previewBrightness = Number(brightnessRange.value);
  }

  if (!isContrastAuto()) {
    previewContrast = Number(contrastRange.value);
  }

  setPreviewFilter(previewBrightness, previewContrast);
}

function runAutoAdjustment() {
  if (!cameraStream || !cameraVideo.videoWidth || !autoAdjustCtx) return;
  if (!isBrightnessAuto() && !isContrastAuto()) return;

  const sampleSize = 64;
  autoAdjustCanvas.width = sampleSize;
  autoAdjustCanvas.height = sampleSize;

  try {
    autoAdjustCtx.drawImage(cameraVideo, 0, 0, sampleSize, sampleSize);
    const pixels = autoAdjustCtx.getImageData(0, 0, sampleSize, sampleSize).data;

    let sum = 0;
    let sumSq = 0;
    let count = 0;

    for (let i = 0; i < pixels.length; i += 16) {
      const r = pixels[i];
      const g = pixels[i + 1];
      const b = pixels[i + 2];
      const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
      sum += luminance;
      sumSq += luminance * luminance;
      count += 1;
    }

    if (!count) return;

    const mean = sum / count;
    const variance = Math.max(0, sumSq / count - mean * mean);
    const stdDev = Math.sqrt(variance);

    const nextBrightness = isBrightnessAuto()
      ? clampValue(100 + (128 - mean) * 0.45, 65, 140)
      : previewBrightness;

    const nextContrast = isContrastAuto()
      ? clampValue(100 + (52 - stdDev) * 0.65, 75, 135)
      : previewContrast;

    setPreviewFilter(nextBrightness, nextContrast);
  } catch (error) {
    console.warn('auto brightness/contrast failed', error);
  }
}

function startAutoAdjustment() {
  if (autoAdjustTimer) return;
  runAutoAdjustment();
  autoAdjustTimer = setInterval(runAutoAdjustment, 500);
}

function stopAutoAdjustment() {
  if (!autoAdjustTimer) return;
  clearInterval(autoAdjustTimer);
  autoAdjustTimer = null;
}

function getVideoTrack() {
  if (!cameraStream) return null;
  return cameraStream.getVideoTracks()[0] || null;
}

function setupCameraControls() {
  cameraTrack = getVideoTrack();
  cameraCapabilities = cameraTrack && cameraTrack.getCapabilities
    ? cameraTrack.getCapabilities()
    : {};

  const notes = [];

  if (cameraCapabilities.zoom) {
    hardwareZoomSupported = true;

    minZoom = cameraCapabilities.zoom.min ?? 1;
    maxZoom = cameraCapabilities.zoom.max ?? 4;
    zoomStep = cameraCapabilities.zoom.step ?? 0.1;

    zoomRange.min = minZoom;
    zoomRange.max = maxZoom;
    zoomRange.step = zoomStep;
    zoomRange.value = minZoom;
    currentZoom = Number(minZoom);
    zoomRange.disabled = false;
    zoomValue.textContent = `${currentZoom.toFixed(1)}x`;
    holder.style.setProperty('--digital-zoom', '1');

    if (btnZoomOut) btnZoomOut.disabled = false;
    if (btnZoomIn) btnZoomIn.disabled = false;
    if (btnZoomReset) btnZoomReset.disabled = false;

    notes.push('ズーム: カメラ側対応');
  } else {
    hardwareZoomSupported = false;

    minZoom = 1;
    maxZoom = 4;
    zoomStep = 0.1;

    zoomRange.min = minZoom;
    zoomRange.max = maxZoom;
    zoomRange.step = zoomStep;
    zoomRange.value = 1;
    currentZoom = 1;
    zoomRange.disabled = false;
    zoomValue.textContent = '1.0x';
    holder.style.setProperty('--digital-zoom', '1');

    if (btnZoomOut) btnZoomOut.disabled = false;
    if (btnZoomIn) btnZoomIn.disabled = false;
    if (btnZoomReset) btnZoomReset.disabled = false;

    notes.push('ズーム: デジタルズーム');
  }

  if (cameraCapabilities.focusMode && cameraCapabilities.focusMode.length) {
    focusModeSelect.innerHTML = '';
    cameraCapabilities.focusMode.forEach(mode => {
      const option = document.createElement('option');
      option.value = mode;
      option.textContent =
        mode === 'continuous' ? '自動' :
        mode === 'single-shot' ? '一回だけAF' :
        mode === 'manual' ? '手動' :
        mode;
      focusModeSelect.appendChild(option);
    });

    const preferredFocusMode = cameraCapabilities.focusMode.includes('continuous')
      ? 'continuous'
      : cameraCapabilities.focusMode.includes('single-shot')
        ? 'single-shot'
        : cameraCapabilities.focusMode[0];

    focusModeSelect.value = preferredFocusMode;
    focusModeSelect.disabled = false;
    btnRefocus.disabled = false;
    focusRange.disabled = !(preferredFocusMode === 'manual' && cameraCapabilities.focusDistance);
    applyFocusMode(preferredFocusMode, true);

    notes.push(preferredFocusMode === 'continuous' ? 'フォーカス: 自動' : 'フォーカス: 対応');
  } else {
    focusModeSelect.disabled = true;
    btnRefocus.disabled = true;
    focusRange.disabled = true;
    notes.push('フォーカス: 非対応または自動のみ');
  }

  if (cameraCapabilities.focusDistance) {
    const cap = cameraCapabilities.focusDistance;
    focusRange.min = cap.min ?? 0;
    focusRange.max = cap.max ?? 1;
    focusRange.step = cap.step || 0.01;
  } else {
    focusRange.disabled = true;
  }

  if (cameraCapabilities.exposureCompensation) {
    const cap = cameraCapabilities.exposureCompensation;
    exposureRange.min = cap.min;
    exposureRange.max = cap.max;
    exposureRange.step = cap.step || 0.1;
    exposureRange.value = 0;
    exposureRange.disabled = false;
    exposureValue.textContent = '0';
    notes.push('露出補正: 対応');
  } else {
    exposureRange.disabled = true;
    exposureValue.textContent = '非対応';
    notes.push('露出補正: 非対応');
  }

  notes.push(levelGuideStatus);
  cameraSupportNote.textContent = notes.join(' / ');
}

async function applyZoom(value) {
  let zoom = Number(value);
  if (!Number.isFinite(zoom)) zoom = minZoom;

  zoom = Math.max(minZoom, Math.min(maxZoom, zoom));
  currentZoom = zoom;

  zoomRange.value = zoom;
  zoomValue.textContent = `${zoom.toFixed(1)}x`;

  // カメラ側ズーム対応時は映像自体がズームされるので、CSS拡大は重ねない。
  // 非対応時だけプレビューと保存画像でデジタルズームする。
  holder.style.setProperty('--digital-zoom', hardwareZoomSupported ? '1' : zoom);

  if (!cameraTrack || !hardwareZoomSupported) return;

  try {
    await cameraTrack.applyConstraints({
      advanced: [{ zoom }]
    });
  } catch (error) {
    console.warn('hardware zoom failed, using digital zoom', error);
    hardwareZoomSupported = false;
    holder.style.setProperty('--digital-zoom', zoom);
  }
}

async function applyFocusMode(mode, silent = false) {
  if (!cameraTrack) return;

  try {
    await cameraTrack.applyConstraints({
      advanced: [{ focusMode: mode }]
    });

    focusRange.disabled = !(mode === 'manual' && cameraCapabilities.focusDistance);
  } catch (error) {
    console.warn('focus mode failed', error);
    if (!silent) {
      alert('この端末/ブラウザではフォーカス制御に対応していない可能性があります。');
    }
  }
}

async function applyFocusDistance(value) {
  if (!cameraTrack || !cameraCapabilities.focusDistance) return;

  try {
    await cameraTrack.applyConstraints({
      advanced: [{
        focusMode: 'manual',
        focusDistance: Number(value)
      }]
    });
  } catch (error) {
    console.warn('manual focus failed', error);
  }
}

async function refocus() {
  if (!cameraTrack) return;

  try {
    if (cameraCapabilities.focusMode && cameraCapabilities.focusMode.includes('single-shot')) {
      await cameraTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] });
    } else if (cameraCapabilities.focusMode && cameraCapabilities.focusMode.includes('continuous')) {
      await cameraTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
    } else {
      alert('この端末/ブラウザではフォーカス再調整に対応していない可能性があります。');
    }
  } catch (error) {
    console.warn('refocus failed', error);
    alert('フォーカス再調整に失敗しました。');
  }
}

async function applyExposureCompensation(value) {
  if (!cameraTrack || !cameraCapabilities.exposureCompensation) return;

  const exposure = Number(value);
  exposureValue.textContent = exposure.toFixed(2);

  try {
    await cameraTrack.applyConstraints({
      advanced: [{ exposureCompensation: exposure }]
    });
  } catch (error) {
    console.warn('exposure compensation failed', error);
    exposureValue.textContent = '失敗';
  }
}

function showFocusMarker(x, y) {
  focusMarker.style.left = `${x}px`;
  focusMarker.style.top = `${y}px`;

  focusMarker.classList.remove('show');
  void focusMarker.offsetWidth;
  focusMarker.classList.add('show');
}

async function refocusAtPoint(x, y) {
  showFocusMarker(x, y);
  await refocus();
}

function getScreenAngle() {
  if (screen.orientation && typeof screen.orientation.angle === 'number') {
    return screen.orientation.angle;
  }
  return typeof window.orientation === 'number' ? window.orientation : 0;
}

function getRollFromOrientation(event) {
  const beta = typeof event.beta === 'number' ? event.beta : 0;
  const gamma = typeof event.gamma === 'number' ? event.gamma : 0;
  const screenAngle = getScreenAngle();

  // 縦持ちは gamma、横持ちは beta を使うと自然に見えやすい。
  if (Math.abs(screenAngle) === 90 || Math.abs(screenAngle) === 270) {
    return beta;
  }
  return gamma;
}

function updateLevelLine(roll) {
  if (!guideLevel || !Number.isFinite(roll)) return;

  const clamped = Math.max(-45, Math.min(45, roll));
  // スマホの傾きと逆向きに回して、画面上の水平目安として使う。
  holder.style.setProperty('--level-angle', `${-clamped}deg`);
  guideLevel.classList.toggle('level-ok', Math.abs(clamped) < 1.5);
}

function handleDeviceOrientation(event) {
  updateLevelLine(getRollFromOrientation(event));
}

async function enableLevelGuide() {
  if (!window.DeviceOrientationEvent) {
    levelGuideStatus = '水平線: 固定表示';
    return;
  }

  try {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission !== 'granted') {
        levelGuideStatus = '水平線: 許可なし';
        return;
      }
    }

    if (!levelGuideActive) {
      window.addEventListener('deviceorientation', handleDeviceOrientation, true);
      levelGuideActive = true;
    }

    levelGuideStatus = '水平線: 傾き対応';
  } catch (error) {
    console.warn('device orientation failed', error);
    levelGuideStatus = '水平線: 固定表示';
  }
}

async function startCamera() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('このブラウザではカメラ機能が使えません。');
      return;
    }

    if (cameraStream) {
      stopCamera();
    }

    await enableLevelGuide();
    applyPreviewAspect();
    const { ratio } = getAspectRatioParts();

    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: OUTPUT_SIZE },
          height: { ideal: OUTPUT_SIZE },
          aspectRatio: { ideal: ratio }
        },
        audio: false
      });
    } catch (firstError) {
      console.warn('high resolution camera request failed, retrying default camera', firstError);
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' }
        },
        audio: false
      });
    }

    cameraVideo.srcObject = cameraStream;
    await cameraVideo.play();

    holder.classList.add('camera-on');
    setupCameraControls();
    updateAdjustmentControlState();

    btnCamera.textContent = '■ カメラ停止';
    btnShot.disabled = false;
    btnRetake.disabled = true;
  } catch (error) {
    console.error(error);
    alert('カメラを起動できませんでした: ' + (error.message || error.name || error));
  }
}

function stopCamera() {
  stopAutoAdjustment();

  if (cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }

  cameraTrack = null;
  cameraCapabilities = {};

  cameraVideo.srcObject = null;
  holder.classList.remove('camera-on');

  btnCamera.textContent = '📷 カメラ起動';
  btnShot.disabled = true;
  zoomRange.disabled = true;
  if (btnZoomOut) btnZoomOut.disabled = true;
  if (btnZoomIn) btnZoomIn.disabled = true;
  if (btnZoomReset) btnZoomReset.disabled = true;
  holder.style.setProperty('--digital-zoom', '1');
  holder.style.setProperty('--level-angle', '0deg');
  if (guideLevel) guideLevel.classList.remove('level-ok');
  focusModeSelect.disabled = true;
  focusRange.disabled = true;
  btnRefocus.disabled = true;
  exposureRange.disabled = true;
  exposureValue.textContent = '非対応';
}

function drawVideoCover(ctx, video, w, h) {
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  if (!vw || !vh) {
    throw new Error('カメラ映像の読み込みが完了していません。');
  }

  const videoRatio = vw / vh;
  const canvasRatio = w / h;

  let sx = 0;
  let sy = 0;
  let sw = vw;
  let sh = vh;

  if (videoRatio > canvasRatio) {
    sw = vh * canvasRatio;
    sx = (vw - sw) / 2;
  } else {
    sh = vw / canvasRatio;
    sy = (vh - sh) / 2;
  }

  const digitalZoom = hardwareZoomSupported ? 1 : Math.max(1, currentZoom || 1);
  const zoomedSw = sw / digitalZoom;
  const zoomedSh = sh / digitalZoom;
  sx += (sw - zoomedSw) / 2;
  sy += (sh - zoomedSh) / 2;
  sw = zoomedSw;
  sh = zoomedSh;

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
}

function captureFromCamera() {
  try {
    if (!cameraStream || !cameraVideo.videoWidth) {
      alert('カメラ映像がまだ準備できていません。');
      return;
    }

    const output = getOutputSizeByAspect();
    const w = output.width;
    const h = output.height;

    captureCanvas.width = w;
    captureCanvas.height = h;

    const ctx = captureCanvas.getContext('2d');
    ctx.filter = `brightness(${previewBrightness}%) contrast(${previewContrast}%)`;
    drawVideoCover(ctx, cameraVideo, w, h);
    ctx.filter = 'none';

    const src = captureCanvas.toDataURL('image/jpeg', 0.95);

    imgs.push({ src });
    current = imgs.length - 1;
    lastCameraShotIndex = current;

    btnSave.disabled = false;
    btnRetake.disabled = false;

    stopCamera();
    render();
  } catch (error) {
    console.error(error);
    alert('撮影に失敗しました: ' + (error.message || error));
  }
}

function retakePhoto() {
  if (lastCameraShotIndex >= 0 && imgs[lastCameraShotIndex]) {
    imgs.splice(lastCameraShotIndex, 1);

    if (imgs.length === 0) {
      current = 0;
    } else {
      current = Math.max(0, Math.min(lastCameraShotIndex - 1, imgs.length - 1));
    }

    lastCameraShotIndex = -1;
    btnRetake.disabled = true;
    render();
  }

  startCamera();
}

function dataURLToBlob(dataURL) {
  const parts = dataURL.split(',');
  const mimeMatch = parts[0].match(/:(.*?);/);
  const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
  const binary = atob(parts[1]);
  const length = binary.length;
  const array = new Uint8Array(length);

  for (let i = 0; i < length; i++) {
    array[i] = binary.charCodeAt(i);
  }

  return new Blob([array], { type: mime });
}

async function saveCurrentImage() {
  if (current < 0 || !imgs[current] || !imgs[current].src) {
    alert('保存する画像がありません。先に撮影してください。');
    return;
  }

  const blob = dataURLToBlob(imgs[current].src);
  const filename = `pokestop-postcard-${new Date().toISOString().replace(/[:.]/g, '-')}.jpg`;
  const file = new File([blob], filename, { type: 'image/jpeg' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: 'ポストカード画像'
      });
      return;
    } catch (error) {
      console.log('共有がキャンセルされました', error);
    }
  }

  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();

  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

btnDisk.addEventListener('click', () => setMode('disk'));
btnGift.addEventListener('click', () => setMode('gift'));

btnGrid.addEventListener('click', () => {
  gridState = (gridState + 1) % 3;
  grid3x3.className = 'grid-overlay' + (gridState === 1 ? ' grid-3x3' : '');
  gridCenter.className = 'grid-overlay' + (gridState === 2 ? ' grid-center' : '');
  btnGrid.classList.toggle('active', gridState !== 0);
});

fileInput.addEventListener('change', event => load(event.target.files));

const preventDefault = event => event.preventDefault();
['dragover', 'drop'].forEach(eventName => {
  stage.addEventListener(eventName, preventDefault);
  dropzone.addEventListener(eventName, preventDefault);
});

stage.addEventListener('dragenter', () => stage.classList.add('drag-over'));
stage.addEventListener('dragleave', () => stage.classList.remove('drag-over'));
stage.addEventListener('drop', event => {
  stage.classList.remove('drag-over');
  load(event.dataTransfer.files);
});

btnPrev.addEventListener('click', () => go(-1));
btnNext.addEventListener('click', () => go(1));

document.addEventListener('keydown', event => {
  if (event.key === 'ArrowLeft') go(-1);
  if (event.key === 'ArrowRight') go(1);
});

let startX = 0;
stage.addEventListener('touchstart', event => {
  startX = event.touches[0].clientX;
});
stage.addEventListener('touchend', event => {
  const diff = event.changedTouches[0].clientX - startX;
  if (Math.abs(diff) > 50) go(diff > 0 ? -1 : 1);
});

aspectSelect.addEventListener('change', applyPreviewAspect);
brightnessMode.addEventListener('change', updateAdjustmentControlState);
contrastMode.addEventListener('change', updateAdjustmentControlState);
brightnessRange.addEventListener('input', updatePreviewFilter);
contrastRange.addEventListener('input', updatePreviewFilter);
zoomRange.addEventListener('input', () => applyZoom(zoomRange.value));
if (btnZoomOut) {
  btnZoomOut.addEventListener('click', () => applyZoom(currentZoom - zoomStep));
}
if (btnZoomIn) {
  btnZoomIn.addEventListener('click', () => applyZoom(currentZoom + zoomStep));
}
if (btnZoomReset) {
  btnZoomReset.addEventListener('click', () => applyZoom(minZoom));
}
focusModeSelect.addEventListener('change', () => applyFocusMode(focusModeSelect.value));
focusRange.addEventListener('input', () => applyFocusDistance(focusRange.value));
btnRefocus.addEventListener('click', refocus);
exposureRange.addEventListener('input', () => applyExposureCompensation(exposureRange.value));

holder.addEventListener('click', event => {
  if (!cameraStream) return;

  const rect = holder.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  refocusAtPoint(x, y);
});

btnCamera.addEventListener('click', () => {
  if (cameraStream) {
    stopCamera();
  } else {
    startCamera();
  }
});

btnShot.addEventListener('click', captureFromCamera);
btnRetake.addEventListener('click', retakePhoto);
btnSave.addEventListener('click', saveCurrentImage);

applyPreviewAspect();
updateAdjustmentControlState();
render();
</script>
</body>
</html>
