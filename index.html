<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケストポスカ確認用</title>
    <style>
        :root {
            --orange: #d45228;
            --blue:   #3a7ab5;
            --bg:     #181f26;
            --panel:  #1e2830;
            --surface:#252f38;
            --border: #2e3d4a;
            --text:   #e8edf2;
            --muted:  #607080;
            --pokestop-blue: #30bef0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: .7rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .logo-dot {
            width: 8px; height: 8px;
            background: var(--orange);
            border-radius: 50%;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .grid-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            padding: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        .grid-btn.active {
            color: var(--orange);
            border-color: var(--orange);
            background: rgba(212, 82, 40, 0.1);
        }

        .mode-switch {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .mode-btn {
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 12px;
            cursor: pointer;
            transition: background .15s, color .15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mode-btn:last-child { border-right: none; }
        .mode-btn.active { background: var(--orange); color: #fff; }
        
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 1rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--panel);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stage {
            background: var(--pokestop-blue);
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            user-select: none;
            touch-action: pan-y;
            transition: background 0.3s;
        }
        .stage.drag-over { outline: 2px dashed var(--orange); outline-offset: -4px; }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 28px;
            line-height: 1;
            border-radius: 50%;
            z-index: 10;
            transition: background 0.2s;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(0, 0, 0, 0.4); }
        .nav-btn:disabled { opacity: 0; cursor: default; }
        .nav-btn.prev { left: 10px; }
        .nav-btn.next { right: 10px; }

        .frame-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            transition: opacity .3s;
        }
        .ring-1 { width: 282px; height: 282px; border: 2.5px solid #fff; }
        .ring-2 { width: 302px; height: 302px; border: 1px solid rgba(255,255,255,.3); }

        .mode-gift .ring { opacity: 0; }
        .mode-disk .ring { opacity: 1; }

        .holder {
            width: 260px; height: 260px;
            overflow: hidden;
            position: relative;
            background: #000;
            flex-shrink: 0;
            transition: border-radius .3s;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .mode-disk .holder { border-radius: 50%; }
        .mode-gift .holder { border-radius: 0; }

        .holder img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: none;
        }
        
        .grid-3x3 { display: block; }
        .grid-3x3 .line { position: absolute; background: rgba(255, 255, 255, 0.4); }
        .grid-3x3 .v1 { left: 33.33%; top: 0; bottom: 0; width: 1px; }
        .grid-3x3 .v2 { left: 66.66%; top: 0; bottom: 0; width: 1px; }
        .grid-3x3 .h1 { top: 33.33%; left: 0; right: 0; height: 1px; }
        .grid-3x3 .h2 { top: 66.66%; left: 0; right: 0; height: 1px; }

        .grid-center { display: block; }
        .grid-center .center-cross {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
        }
        .grid-center .center-cross::before,
        .grid-center .center-cross::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.6);
        }
        .grid-center .center-cross::before { top: 50%; left: 0; width: 100%; height: 1px; }
        .grid-center .center-cross::after { left: 50%; top: 0; height: 100%; width: 1px; }
        
        .grid-center .edge-mark { position: absolute; background: rgba(255, 255, 255, 0.5); }
        .grid-center .mark-t { top: 0; left: 50%; width: 1px; height: 8px; transform: translateX(-50%); }
        .grid-center .mark-b { bottom: 0; left: 50%; width: 1px; height: 8px; transform: translateX(-50%); }
        .grid-center .mark-l { left: 0; top: 50%; height: 1px; width: 8px; transform: translateY(-50%); }
        .grid-center .mark-r { right: 0; top: 50%; height: 1px; width: 8px; transform: translateY(-50%); }

        .empty {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px; color: #fff; font-size: 12px; text-align: center;
        }

        .counter {
            margin-top: 1rem;
            font-size: 12px;
            color: #fff;
            letter-spacing: 1px;
            min-height: 16px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .dots {
            display: flex; gap: 6px; margin-top: .5rem;
            min-height: 10px;
        }
        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: background .15s;
        }
        .dot.active { background: #fff; }

        .controls {
            border-top: 1px solid var(--border);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .thumbs {
            display: flex; flex-wrap: wrap; gap: 6px;
            min-height: 0;
            max-height: 150px;
            overflow-y: auto;
            padding: 2px;
        }
        .thumb {
            width: 48px; height: 48px;
            object-fit: cover;
            border: 2px solid transparent;
            cursor: pointer;
            opacity: .5;
            transition: all .15s;
            border-radius: 4px;
        }
        .thumb.active { border-color: var(--orange); opacity: 1; transform: scale(1.05); }
        .thumb:hover { opacity: .85; }

        .dropzone {
            border: 2px dashed var(--border);
            padding: 1.25rem;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: rgba(255,255,255,0.02);
        }
        .dropzone:hover, .dropzone.drag-over { 
            border-color: var(--orange); 
            background: rgba(212, 82, 40, 0.05);
        }
        .drop-label {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; color: var(--text); font-size: 14px; cursor: pointer;
        }
        input[type="file"] { display: none; }

        .footer {
            padding: 0 0.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
        }

        /* PC等、横長画面用の調整 */
        @media (min-width: 768px) {
            main {
                padding: 2rem;
                align-items: flex-start;
            }
            .card {
                max-width: 600px; /* PCでは少し大きめに表示 */
            }
            .holder {
                width: 300px; height: 300px; /* プレビューを少し拡大 */
            }
            .ring-1 { width: 322px; height: 322px; }
            .ring-2 { width: 342px; height: 342px; }
            .thumb { width: 56px; height: 56px; }
        }
 /* カメラ撮影モード */
.camera-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  z-index: 0;
  background: #000;
}

.holder > img {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.holder.camera-on .camera-video {
  display: block;
}

.holder.camera-on > img,
.holder.camera-on #emptyState {
  display: none !important;
}

.grid-overlay {
  z-index: 2;
}

.empty {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.camera-btn {
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: .8rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
}

.camera-btn:disabled {
  opacity: .45;
  cursor: default;
} 

.camera-note {
  margin: 0;
  opacity: .75;
  font-size: 12px;
  line-height: 1.5;
}

.holder {
  aspect-ratio: var(--camera-aspect, 1 / 1);
}

.camera-video {
  transform: scale(var(--digital-zoom, 1));
  transform-origin: center center;
}
 /* 撮影ガイド */
.camera-guide {
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
  display: none;
}

.holder.camera-on .camera-guide {
  display: block;
}

.guide-line {
  position: absolute;
  background: rgba(255, 255, 255, .75);
  box-shadow: 0 0 2px rgba(0, 0, 0, .7);
}

.guide-line-v {
  top: 0;
  bottom: 0;
  left: 50%;
  width: 1px;
}

.guide-line-h {
  left: 0;
  right: 0;
  top: 50%;
  height: 1px;
}

.guide-circle {
  position: absolute;
  left: 50%;
  top: 50%;
  border: 1px solid rgba(255, 255, 255, .75);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 2px rgba(0, 0, 0, .7);
}

.guide-circle-outer {
  width: 78%;
  aspect-ratio: 1 / 1;
}

.guide-circle-inner {
  width: 42%;
  aspect-ratio: 1 / 1;
  border-style: dashed;
}

.guide-level {
  position: absolute;
  left: 15%;
  right: 15%;
  top: 12%;
  height: 2px;
  background: rgba(255, 255, 255, .85);
  box-shadow: 0 0 2px rgba(0, 0, 0, .7);
}

/* タップフォーカス風UI */
.focus-marker {
  position: absolute;
  width: 64px;
  height: 64px;
  border: 2px solid rgba(255, 255, 255, .95);
  border-radius: 50%;
  z-index: 6;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(.8);
  opacity: 0;
  box-shadow: 0 0 4px rgba(0, 0, 0, .75);
}

.focus-marker.show {
  animation: focus-pop .75s ease-out;
}

@keyframes focus-pop {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1.35);
  }
  20% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(.85);
  }
}

/* 明るさ・コントラスト操作 */
.camera-controls {
  display: grid;
  gap: 10px;
  margin-top: 10px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: 14px;
}

.camera-controls label {
  display: grid;
  gap: 4px;
}

.camera-controls input {
  width: 100%;
}

.camera-note {
  margin: 0;
  opacity: .75;
  font-size: 12px;
  line-height: 1.5;
}

/* プレビュー映像にも補正を反映 */
.camera-video {
  filter: brightness(var(--preview-brightness, 100%)) contrast(var(--preview-contrast, 100%));
}

/* ボタン4つ用 */
.camera-actions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 8px;
}

@media (min-width: 520px) {
  .camera-actions {
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
}       
    </style>
</head>

<script>
let imgs    = [];
let current = 0;
let gridState = 0; 

const body      = document.body;
const holder    = document.getElementById('holder');
const empty     = document.getElementById('emptyState');
const counterEl = document.getElementById('counter');
const dotsEl    = document.getElementById('dots');
const thumbsEl  = document.getElementById('thumbs');
const stage     = document.getElementById('stage');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const btnDisk   = document.getElementById('btn-disk');
const btnGift   = document.getElementById('btn-gift');
const btnGrid   = document.getElementById('btn-grid-toggle');

const grid3x3    = document.getElementById('grid-3x3');
const gridCenter = document.getElementById('grid-center');
const cameraVideo = document.getElementById('cameraVideo');
const btnCamera = document.getElementById('btn-camera');
const btnShot = document.getElementById('btn-shot');
const btnSave = document.getElementById('btn-save');
const captureCanvas = document.getElementById('captureCanvas');

const brightnessRange = document.getElementById('brightnessRange');
const brightnessValue = document.getElementById('brightnessValue');
const contrastRange = document.getElementById('contrastRange');
const contrastValue = document.getElementById('contrastValue');
const exposureRange = document.getElementById('exposureRange');
const exposureValue = document.getElementById('exposureValue');
const cameraSupportNote = document.getElementById('cameraSupportNote');
const focusMarker = document.getElementById('focusMarker');    
const zoomRange = document.getElementById('zoomRange');
const zoomValue = document.getElementById('zoomValue');
const aspectSelect = document.getElementById('aspectSelect');
const focusModeSelect = document.getElementById('focusModeSelect');
const focusRange = document.getElementById('focusRange');
const btnRefocus = document.getElementById('btn-refocus');

let cameraStream = null;
let cameraTrack = null;
let cameraCapabilities = {};
let lastCameraShotIndex = -1;

let previewBrightness = 100;
let previewContrast = 100;
let currentZoom = 1;
let hardwareZoomSupported = false;

const OUTPUT_SIZE = 3072;
btnDisk.onclick = () => setMode('disk');
btnGift.onclick = () => setMode('gift');

function setMode(m) {
    body.className = 'mode-' + m;
    btnDisk.classList.toggle('active', m === 'disk');
    btnGift.classList.toggle('active', m === 'gift');
}

btnGrid.onclick = () => {
    gridState = (gridState + 1) % 3;
    grid3x3.className = 'grid-overlay' + (gridState === 1 ? ' grid-3x3' : '');
    gridCenter.className = 'grid-overlay' + (gridState === 2 ? ' grid-center' : '');
    btnGrid.classList.toggle('active', gridState !== 0);
};

fileInput.onchange = e => load(e.target.files);

const stop = e => e.preventDefault();
['dragover', 'drop'].forEach(evt => {
    stage.addEventListener(evt, stop);
    dropzone.addEventListener(evt, stop);
});

stage.ondragenter = () => stage.classList.add('drag-over');
stage.ondragleave = () => stage.classList.remove('drag-over');
stage.ondrop = e => { stage.classList.remove('drag-over'); load(e.dataTransfer.files); };

function load(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;
    let n = 0;
    const start = imgs.length;
    files.forEach(f => {
        const r = new FileReader();
        r.onload = e => {
            imgs.push({ src: e.target.result });
            if (++n === files.length) { 
                current = start; 
                render(); 
            }
        };
        r.readAsDataURL(f);
    });
}

function render() {
    const old = holder.querySelector('img');
    if (old) old.remove();

    empty.style.display = imgs.length ? 'none' : 'flex';
    if (!imgs.length) {
        counterEl.textContent = '';
        dotsEl.innerHTML = '';
        thumbsEl.innerHTML = '';
        btnPrev.disabled = true;
        btnNext.disabled = true;
        return;
    }

    current = Math.max(0, Math.min(current, imgs.length - 1));

    const el = document.createElement('img');
    el.src = imgs[current].src;
    holder.appendChild(el);

    counterEl.textContent = `${current + 1} / ${imgs.length}`;

    dotsEl.innerHTML = '';
    imgs.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === current ? ' active' : '');
        d.onclick = () => { current = i; render(); };
        dotsEl.appendChild(d);
    });

    thumbsEl.innerHTML = '';
    imgs.forEach((im, i) => {
        const t = document.createElement('img');
        t.src = im.src;
        t.className = 'thumb' + (i === current ? ' active' : '');
        t.onclick = () => { current = i; render(); };
        thumbsEl.appendChild(t);
    });

    btnPrev.disabled = current === 0;
    btnNext.disabled = current === imgs.length - 1;
}

const go = dir => {
    const next = current + dir;
    if (next >= 0 && next < imgs.length) {
        current = next;
        render();
    }
};

btnPrev.onclick = () => go(-1);
btnNext.onclick = () => go(1);

document.onkeydown = e => {
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === 'ArrowRight') go(1);
};

let startX = 0;
stage.ontouchstart = e => startX = e.touches[0].clientX;
stage.ontouchend = e => {
    const diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) go(diff > 0 ? -1 : 1);
};
function getAspectRatioParts() {
  const [w, h] = aspectSelect.value.split(':').map(Number);
  return { w, h, ratio: w / h };
}

function getOutputSizeByAspect() {
  const { w, h } = getAspectRatioParts();

  if (w === h) {
    return {
      width: OUTPUT_SIZE,
      height: OUTPUT_SIZE
    };
  }

  if (w > h) {
    return {
      width: OUTPUT_SIZE,
      height: Math.round(OUTPUT_SIZE * h / w)
    };
  }

  return {
    width: Math.round(OUTPUT_SIZE * w / h),
    height: OUTPUT_SIZE
  };
}

function applyPreviewAspect() {
  const { w, h } = getAspectRatioParts();
  holder.style.setProperty('--camera-aspect', `${w} / ${h}`);
}

function getVideoTrack() {
  if (!cameraStream) return null;
  return cameraStream.getVideoTracks()[0] || null;
}

function setupCameraControls() {
  cameraTrack = getVideoTrack();
  if (!cameraTrack) return;

  cameraCapabilities = cameraTrack.getCapabilities ? cameraTrack.getCapabilities() : {};
  const notes = [];

  // ズーム対応確認
  if (cameraCapabilities.zoom) {
    hardwareZoomSupported = true;

    const min = cameraCapabilities.zoom.min ?? 1;
    const max = cameraCapabilities.zoom.max ?? 4;
    const step = cameraCapabilities.zoom.step ?? 0.1;

    zoomRange.min = min;
    zoomRange.max = max;
    zoomRange.step = step;
    zoomRange.value = min;

    currentZoom = Number(min);
    zoomValue.textContent = `${currentZoom.toFixed(1)}x`;
    zoomRange.disabled = false;

    notes.push('ズーム: カメラ側ズーム対応');
  } else {
    hardwareZoomSupported = false;

    zoomRange.min = 1;
    zoomRange.max = 4;
    zoomRange.step = 0.1;
    zoomRange.value = 1;
    zoomRange.disabled = false;

    notes.push('ズーム: 端末非対応のためデジタルズーム');
  }

  // フォーカス対応確認
  if (cameraCapabilities.focusMode && cameraCapabilities.focusMode.length) {
    focusModeSelect.innerHTML = '';

    cameraCapabilities.focusMode.forEach(mode => {
      const option = document.createElement('option');
      option.value = mode;
      option.textContent =
        mode === 'continuous' ? '自動' :
        mode === 'single-shot' ? '一回だけAF' :
        mode === 'manual' ? '手動' :
        mode;
      focusModeSelect.appendChild(option);
    });

    focusModeSelect.disabled = false;
    btnRefocus.disabled = false;

    notes.push('フォーカス: モード変更対応');
  } else {
    notes.push('フォーカス: このブラウザでは制御不可の可能性あり');
  }

  // 手動フォーカス距離
  if (cameraCapabilities.focusDistance) {
    const min = cameraCapabilities.focusDistance.min ?? 0;
    const max = cameraCapabilities.focusDistance.max ?? 1;
    const step = cameraCapabilities.focusDistance.step ?? 0.01;

    focusRange.min = min;
    focusRange.max = max;
    focusRange.step = step;
    focusRange.value = min;
  }

  cameraSupportNote.textContent = notes.join(' / ');
}

async function applyZoom(value) {
  currentZoom = Number(value);
  zoomValue.textContent = `${currentZoom.toFixed(1)}x`;

  // プレビュー用の見た目ズーム
  holder.style.setProperty('--digital-zoom', currentZoom);

  if (!cameraTrack || !hardwareZoomSupported) return;

  try {
    await cameraTrack.applyConstraints({
      advanced: [{ zoom: currentZoom }]
    });
  } catch (err) {
    console.warn('hardware zoom failed, using digital zoom only', err);
  }
}

async function applyFocusMode(mode) {
  if (!cameraTrack) return;

  try {
    await cameraTrack.applyConstraints({
      advanced: [{ focusMode: mode }]
    });

    if (mode === 'manual' && cameraCapabilities.focusDistance) {
      focusRange.disabled = false;
    } else {
      focusRange.disabled = true;
    }
  } catch (err) {
    console.warn('focus mode failed', err);
    alert('この端末/ブラウザではフォーカス制御に対応していない可能性があります。');
  }
}

async function applyFocusDistance(value) {
  if (!cameraTrack || !cameraCapabilities.focusDistance) return;

  try {
    await cameraTrack.applyConstraints({
      advanced: [{
        focusMode: 'manual',
        focusDistance: Number(value)
      }]
    });
  } catch (err) {
    console.warn('manual focus failed', err);
  }
}

async function refocus() {
  if (!cameraTrack) return;

  try {
    if (
      cameraCapabilities.focusMode &&
      cameraCapabilities.focusMode.includes('single-shot')
    ) {
      await cameraTrack.applyConstraints({
        advanced: [{ focusMode: 'single-shot' }]
      });
    } else if (
      cameraCapabilities.focusMode &&
      cameraCapabilities.focusMode.includes('continuous')
    ) {
      await cameraTrack.applyConstraints({
        advanced: [{ focusMode: 'continuous' }]
      });
    } else {
      alert('この端末/ブラウザではフォーカス再調整に対応していない可能性があります。');
    }
  } catch (err) {
    console.warn('refocus failed', err);
    alert('フォーカス再調整に失敗しました。');
  }
}

zoomRange.oninput = () => applyZoom(zoomRange.value);

function setupExposureControl() {
  if (!cameraTrack || !cameraTrack.getCapabilities) {

    exposureValue.textContent = '非対応';

  } else {

  }
}

async function applyExposureCompensation(value) {
  if (!cameraTrack || !cameraCapabilities.exposureCompensation) return;

  const exposure = Number(value);
  exposureValue.textContent = exposure.toFixed(2);

  try {
    await cameraTrack.applyConstraints({
      advanced: [{ exposureCompensation: exposure }]

function showFocusMarker(x, y) {
  focusMarker.style.left = `${x}px`;

holder.addEventListener('click', async (event) => {

async function startCamera() {
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('このブラウザではカメラ機能が使えません。');
      return;
    }

    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 3072 },
        height: { ideal: 3072 }
      },
      audio: false
    });

    cameraVideo.srcObject = cameraStream;
    holder.classList.add('camera-on');

    cameraTrack = cameraStream.getVideoTracks()[0] || null;
    cameraCapabilities = cameraTrack && cameraTrack.getCapabilities
      ? cameraTrack.getCapabilities()
      : {};

    if (typeof setupExposureControl === 'function') {
      setupExposureControl();
    }

    if (typeof updatePreviewFilter === 'function') {
      updatePreviewFilter();

    btnCamera.textContent = '■ カメラ停止';
    btnShot.disabled = false;

    if (typeof btnRetake !== 'undefined' && btnRetake) {

  } catch (err) {

}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }

  cameraTrack = null;
  cameraCapabilities = {};

  cameraVideo.srcObject = null;
  holder.classList.remove('camera-on');

  btnCamera.textContent = '📷 カメラ起動';
  btnShot.disabled = true;

  exposureRange.disabled = true;
  exposureValue.textContent = '非対応';
}

function drawVideoCover(ctx, video, w, h) {
  const vw = video.videoWidth;
  const vh = video.videoHeight;

  const videoRatio = vw / vh;
  const canvasRatio = w / h;

  let sx = 0;
  let sy = 0;
  let sw = vw;
  let sh = vh;

  if (videoRatio > canvasRatio) {
    sw = vh * canvasRatio;
    sx = (vw - sw) / 2;
  } else {
    sh = vw / canvasRatio;
    sy = (vh - sh) / 2;
  }

  // デジタルズーム用に、さらに中央を切り出す
  const zoom = Math.max(1, currentZoom || 1);
  const zoomedSw = sw / zoom;
  const zoomedSh = sh / zoom;
  sx += (sw - zoomedSw) / 2;
  sy += (sh - zoomedSh) / 2;
  sw = zoomedSw;
  sh = zoomedSh;

  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, w, h);
}

function dataURLToBlob(dataURL) {
  const parts = dataURL.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const binary = atob(parts[1]);
  const length = binary.length;
  const array = new Uint8Array(length);

  for (let i = 0; i < length; i++) {
    array[i] = binary.charCodeAt(i);
  }

  return new Blob([array], { type: mime });
}

async function saveCurrentImage() {
  if (current < 0 || !imgs[current] || !imgs[current].src) {
    alert('保存する画像がありません。先に撮影してください。');
    return;
  }

  const blob = dataURLToBlob(imgs[current].src);
  const filename = `pokestop-postcard-${Date.now()}.jpg`;
  const file = new File([blob], filename, { type: 'image/jpeg' });

  // iPhone / Android の共有メニューを優先
  if (
    navigator.share &&
    navigator.canShare &&
    navigator.canShare({ files: [file] })
  ) {
    try {
      await navigator.share({
        files: [file],
        title: 'ポストカード画像'
      });
      return;
    } catch (err) {
      console.log('共有がキャンセルされました', err);
    }
  }

  // 共有できない場合はダウンロード
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(() => {
    URL.revokeObjectURL(url);
  }, 1000);
}
